site_name: My Algorithm Templates
site_description: 信竞算法笔记与代码模板文档站
site_author: EndeavourCHN

exclude_docs: |
  superpowers/**

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - def_list
  - footnotes
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md
  - 算法基础:
      - 简介: basic/index.md
      - 排序: basic/sort.md
      - 枚举: basic/enumerate.md
      - 二分: basic/binary.md
      - 递归与分治: basic/divide-and-conquer.md
      - 倍增: basic/binary-lifting.md
      - 贪心: basic/greedy.md
      - 前缀和与差分: basic/prefix-sum.md
  - 数据结构:
      - 简介: ds/index.md
      - 序列式容器: ds/sequence-container.md
      - 关联式容器: ds/associative-container.md
      - 单调栈: ds/monotonic-stack.md
      - 单调队列: ds/monotonic-queue.md
      - 并查集: ds/dsu.md
      - 树状数组: ds/fenwick.md
  - 搜索:
      - 简介: search/index.md
      - DFS: search/dfs.md
      - BFS: search/bfs.md
      - 记忆化搜索: search/memo.md
      - 剪枝: search/pruning.md
  - 动态规划:
      - 简介: dp/index.md
      - 背包 DP: dp/knapsack.md
      - 线性 DP: dp/linear.md
      - 区间 DP: dp/interval.md
      - 树形 DP: dp/tree.md
  - 字符串:
      - 简介: string/index.md
  - 图论:
      - 简介: graph/index.md
  - 数学:
      - 简介: math/index.md
      - 高精度: math/bignum.md
      - 筛法: math/sieve.md
      - 快速幂: math/binary-exponentiation.md
  - 杂项:
      - 简介: misc/index.md
      - 离散化: misc/discrete.md
